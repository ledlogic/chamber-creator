<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chamber Creator 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;700&display=swap');

  :root {
    --parchment: #c8a96e;
    --ink: #1a0f00;
    --blood: #7a1e1e;
    --shadow: #0d0a06;
    --gold: #c9922a;
    --stone-light: #9e9080;
    --stone-dark: #4a4038;
    --vignette: rgba(10,6,0,0.85);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0a06;
    color: #c8a96e;
    font-family: 'IM Fell English', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: 
      radial-gradient(ellipse at 50% 0%, rgba(201,146,42,0.08) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none; z-index: 0;
  }

  header {
    text-align: center;
    padding: 28px 20px 12px;
    position: relative; z-index: 1;
  }

  header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(201,146,42,0.4), 2px 2px 0 rgba(0,0,0,0.8);
  }

  header p {
    font-style: italic;
    color: #a07840;
    font-size: 0.95rem;
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  .divider {
    width: 320px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 10px auto;
    position: relative;
  }
  .divider::before {
    content: '⚔';
    position: absolute; top: -9px; left: 50%;
    transform: translateX(-50%);
    color: var(--gold); font-size: 1.1rem;
    background: #0d0a06; padding: 0 8px;
  }

  /* Navigation */
  .nav-links {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .nav-links a {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--stone-light);
    text-decoration: none;
    border: 1px solid rgba(158,144,128,0.25);
    padding: 5px 14px;
    transition: color 0.25s, border-color 0.25s, background 0.25s;
  }
  .nav-links a:hover {
    color: var(--gold-bright, #e8b84b);
    border-color: rgba(201,146,42,0.5);
    background: rgba(201,146,42,0.06);
  }
  .nav-links a.nav-active {
    color: var(--gold);
    border-color: rgba(201,146,42,0.35);
    cursor: default;
  }
  .nav-sep {
    color: rgba(158,144,128,0.3);
    font-size: 0.7rem;
    font-family: 'Cinzel', serif;
  }

  .layout {
    display: flex;
    gap: 18px;
    padding: 10px 20px 30px;
    width: 100%;
    max-width: 1300px;
    position: relative; z-index: 1;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* CONTROLS PANEL */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 300px;
    flex-shrink: 0;
  }

  .panel {
    background: linear-gradient(160deg, rgba(30,20,10,0.95), rgba(15,10,5,0.98));
    border: 1px solid rgba(201,146,42,0.3);
    border-radius: 4px;
    padding: 14px 16px;
    position: relative;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,146,42,0.1);
  }

  .panel::before {
    content: '';
    position: absolute; inset: 2px;
    border: 1px solid rgba(201,146,42,0.08);
    border-radius: 3px;
    pointer-events: none;
  }

  .panel-title {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(201,146,42,0.2);
  }

  label {
    display: block;
    font-size: 0.78rem;
    color: #a07840;
    margin-bottom: 3px;
    letter-spacing: 0.06em;
  }

  select, input[type="range"], input[type="text"], textarea {
    width: 100%;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(201,146,42,0.25);
    color: var(--parchment);
    font-family: 'IM Fell English', serif;
    font-size: 0.85rem;
    padding: 6px 10px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 10px;
  }

  select:focus, input:focus, textarea:focus {
    border-color: rgba(201,146,42,0.6);
    box-shadow: 0 0 8px rgba(201,146,42,0.15);
  }

  select option { background: #1a0f00; }

  input[type="range"] {
    padding: 0;
    height: 6px;
    cursor: pointer;
    accent-color: var(--gold);
    margin-bottom: 4px;
  }

  .range-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .range-row input { margin-bottom: 0; flex: 1; }
  .range-val {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 0.8rem;
    min-width: 32px;
    text-align: right;
  }

  /* Color swatches */
  .swatch-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 5px;
    margin-bottom: 10px;
  }

  .swatch {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 2px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
  }

  .swatch:hover { transform: scale(1.1); }
  .swatch.active {
    border-color: var(--gold);
    box-shadow: 0 0 8px rgba(201,146,42,0.5);
  }

  .swatch::after {
    content: '✓';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; color: rgba(255,255,255,0.9);
    opacity: 0;
    text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  }
  .swatch.active::after { opacity: 1; }

  /* Shape buttons */
  .shape-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-bottom: 10px;
  }

  .shape-btn {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(201,146,42,0.2);
    color: #a07840;
    padding: 8px 4px;
    cursor: pointer;
    border-radius: 2px;
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    letter-spacing: 0.05em;
    text-align: center;
    transition: all 0.2s;
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
  }

  .shape-btn svg { opacity: 0.7; }
  .shape-btn:hover { border-color: rgba(201,146,42,0.5); color: var(--parchment); }

  .shape-btn.active {
    background: rgba(201,146,42,0.15);
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 10px rgba(201,146,42,0.2);
  }
  .shape-btn.active svg { opacity: 1; }

  /* Proportion ratio grid */
  .ratio-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
    margin-bottom: 8px;
  }

  .ratio-btn {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(201,146,42,0.2);
    color: #a07840;
    padding: 6px 4px;
    cursor: pointer;
    border-radius: 2px;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.04em;
    text-align: center;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .ratio-btn:hover { border-color: rgba(201,146,42,0.5); color: var(--parchment); }
  .ratio-btn.active {
    background: rgba(201,146,42,0.15);
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 10px rgba(201,146,42,0.2);
  }

  /* Feature toggles */
  .feature-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 6px;
  }

  .feat-btn {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(201,146,42,0.2);
    color: #806030;
    padding: 6px 8px;
    cursor: pointer;
    border-radius: 2px;
    font-family: 'IM Fell English', serif;
    font-size: 0.8rem;
    transition: all 0.2s;
  }

  .feat-btn:hover { border-color: rgba(201,146,42,0.4); color: var(--parchment); }

  .feat-btn.active {
    background: rgba(122,30,30,0.3);
    border-color: rgba(180,60,60,0.5);
    color: #e09090;
  }

  /* Generate button */


  textarea {
    resize: vertical;
    min-height: 80px;
    font-size: 0.8rem;
    line-height: 1.5;
  }



  /* CANVAS AREA */
  .canvas-wrap {
    flex: 1;
    min-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 700px;
  }

  .map-frame {
    background: #080504;
    border: 2px solid rgba(201,146,42,0.4);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.8),
      0 8px 40px rgba(0,0,0,0.8),
      inset 0 0 60px rgba(0,0,0,0.5);
  }

  .map-frame::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 2;
  }

  /* Corner ornaments */
  .corner {
    position: absolute;
    width: 28px; height: 28px;
    border-color: rgba(201,146,42,0.5);
    border-style: solid;
    z-index: 3;
  }
  .corner.tl { top: 6px; left: 6px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 6px; right: 6px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 6px; left: 6px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 6px; right: 6px; border-width: 0 2px 2px 0; }

  canvas {
    display: block;
    width: 100%;
    image-rendering: pixelated;
  }



  .dl-btn {
    width: 100%;
    background: linear-gradient(160deg, rgba(20,60,40,0.3), rgba(10,30,20,0.4));
    border: 1px solid rgba(80,180,100,0.45);
    color: #80c890;
    padding: 10px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 0.82rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-radius: 2px;
    transition: all 0.25s;
    overflow: hidden;
  }

  .dl-btn:hover {
    background: linear-gradient(160deg, rgba(20,60,40,0.5), rgba(10,30,20,0.6));
    border-color: rgba(80,180,100,0.8);
    box-shadow: 0 0 16px rgba(80,180,100,0.25);
    color: #a0e8b0;
  }

  .dl-btn:active { transform: scale(0.98); }

  .description-box {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(201,146,42,0.15);
    border-radius: 3px;
    padding: 12px 16px;
    font-size: 1.15rem;
    color: #b09070;
    line-height: 1.7;
    font-style: italic;
    min-height: 48px;
  }

  /* Door counter */
  .door-counter {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .door-dec, .door-inc {
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(201,146,42,0.3);
    color: var(--gold);
    width: 28px; height: 28px;
    cursor: pointer;
    border-radius: 2px;
    font-size: 1.1rem;
    line-height: 1;
    transition: all 0.15s;
    font-family: monospace;
    flex-shrink: 0;
  }

  .door-dec:hover, .door-inc:hover {
    background: rgba(201,146,42,0.15);
    border-color: var(--gold);
  }

  .door-count-val {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 1.1rem;
    min-width: 20px;
    text-align: center;
    flex-shrink: 0;
  }

  .door-positions {
    font-family: 'Cinzel', serif;
    color: #a07840;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(201,146,42,0.15);
    border-radius: 2px;
    padding: 3px 8px;
    flex: 1;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>Chamber Creator 2026</h1>
  <div class="divider"></div>
  <p>Forge thy chamber from darkness and stone</p>
  <nav class="nav-links">
    <a href="index.html">&#8962; Home</a>
    <span class="nav-sep">&#9670;</span>
    <a class="nav-active" href="chamber-creator.html">&#9647; Chambers</a>
    <span class="nav-sep">&#9670;</span>
    <a href="corridor-creator.html">&#10230; Corridors</a>
  </nav>
</header>

<div class="layout">

  <!-- LEFT CONTROLS -->
  <div class="controls">

    <div class="panel">
      <div class="panel-title">✦ Chamber Shape</div>
      <div class="shape-grid" id="shapeGrid">
        <button class="shape-btn active" data-shape="circle">
          <svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="11" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          Circle
        </button>
        <button class="shape-btn" data-shape="octagon">
          <svg width="28" height="28" viewBox="0 0 28 28"><polygon points="10,3 18,3 25,10 25,18 18,25 10,25 3,18 3,10" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          Octagon
        </button>
        <button class="shape-btn" data-shape="square">
          <svg width="28" height="28" viewBox="0 0 28 28"><rect x="3" y="3" width="22" height="22" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          Square
        </button>
        <button class="shape-btn" data-shape="rectangle">
          <svg width="28" height="28" viewBox="0 0 28 28"><rect x="2" y="7" width="24" height="14" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          Rect
        </button>
        <button class="shape-btn" data-shape="hexagon">
          <svg width="28" height="28" viewBox="0 0 28 28"><polygon points="14,2 25,8 25,20 14,26 3,20 3,8" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          Hexagon
        </button>
        <button class="shape-btn" data-shape="ellipse">
          <svg width="28" height="28" viewBox="0 0 28 28"><ellipse cx="14" cy="14" rx="12" ry="7" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          Ellipse
        </button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">✦ Dimensions</div>

      <!-- Shown only for rectangle / ellipse -->
      <div id="proportionRow" style="display:none">
        <label>✦ Proportions (Width : Height)</label>
        <div class="ratio-grid" id="ratioGrid">
          <button class="ratio-btn" data-ratio="1.25">
            <svg width="28" height="24" viewBox="0 0 28 24"><rect x="1" y="2" width="26" height="20" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
            5:4
          </button>
          <button class="ratio-btn active" data-ratio="1.5">
            <svg width="28" height="20" viewBox="0 0 28 20"><rect x="1" y="2" width="26" height="16" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
            3:2
          </button>
          <button class="ratio-btn" data-ratio="1.778">
            <svg width="28" height="17" viewBox="0 0 28 17"><rect x="1" y="2" width="26" height="13" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
            16:9
          </button>
          <button class="ratio-btn" data-ratio="2">
            <svg width="28" height="15" viewBox="0 0 28 15"><rect x="1" y="2" width="26" height="11" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
            2:1
          </button>
          <button class="ratio-btn" data-ratio="2.5">
            <svg width="28" height="13" viewBox="0 0 28 13"><rect x="1" y="2" width="26" height="9" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
            5:2
          </button>
          <button class="ratio-btn" data-ratio="3">
            <svg width="28" height="11" viewBox="0 0 28 11"><rect x="1" y="2" width="26" height="7" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
            3:1
          </button>
          <button class="ratio-btn" data-ratio="0.667">
            <svg width="18" height="28" viewBox="0 0 18 28"><rect x="2" y="1" width="14" height="26" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
            2:3
          </button>
          <button class="ratio-btn" data-ratio="custom">
            <svg width="28" height="18" viewBox="0 0 28 18"><rect x="1" y="2" width="26" height="14" stroke="currentColor" stroke-width="1.2" fill="none" stroke-dasharray="3,2"/></svg>
            Custom
          </button>
        </div>
        <div id="customRatioRow" style="display:none">
          <label>Width units</label>
          <div class="range-row">
            <input type="range" id="ratioXSlider" min="1" max="10" value="3">
            <span class="range-val" id="ratioXVal">3</span>
          </div>
          <label>Height units</label>
          <div class="range-row">
            <input type="range" id="ratioYSlider" min="1" max="10" value="2">
            <span class="range-val" id="ratioYVal">2</span>
          </div>
        </div>
      </div>
      <label>Chamber Diameter</label>
      <div class="range-row">
        <input type="range" id="sizeSlider" min="30" max="95" value="65">
        <span class="range-val" id="sizeVal">65%</span>
      </div>
      <label>Wall Thickness</label>
      <div class="range-row">
        <input type="range" id="wallSlider" min="3" max="20" value="9">
        <span class="range-val" id="wallVal">9</span>
      </div>
      <label>Ceiling Height (depth shadow)</label>
      <div class="range-row">
        <input type="range" id="heightSlider" min="0" max="20" value="8">
        <span class="range-val" id="heightVal">8</span>
      </div>
      <label>Door Quantity</label>
      <div class="door-counter">
        <button class="door-dec" id="doorDec">−</button>
        <span class="door-count-val" id="doorCountVal">1</span>
        <button class="door-inc" id="doorInc">+</button>
        <span class="door-positions" id="doorPositions">S</span>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">✦ Wall Material</div>
      <select id="materialSelect">
        <optgroup label="── Fantasy / Ancient ──">
          <option value="stone">Rough Stone</option>
          <option value="brick">Fitted Brick</option>
          <option value="marble">Polished Marble</option>
          <option value="wood">Wooden Planks</option>
          <option value="obsidian">Obsidian</option>
          <option value="ice">Glacial Ice</option>
          <option value="dirt">Earthen Dirt</option>
          <option value="sandstone">Sandstone</option>
          <option value="crystal">Crystal</option>
        </optgroup>
        <optgroup label="── Modern / Sci-Fi ──">
          <option value="smooth">Smooth Plaster</option>
          <option value="concrete">Poured Concrete</option>
          <option value="office">Office Drywall</option>
          <option value="spacestation">Space Station Hull</option>
          <option value="martian">Martian Bedrock</option>
        </optgroup>
      </select>

      <label>Wall Color</label>
      <div class="swatch-grid" id="wallSwatches">
        <div class="swatch active" data-color="stone" style="background:#6e6358" title="Stone Grey"></div>
        <div class="swatch" data-color="brown" style="background:#7a5030" title="Earth Brown"></div>
        <div class="swatch" data-color="red" style="background:#8b3030" title="Blood Red"></div>
        <div class="swatch" data-color="blue" style="background:#2a4a7a" title="Sapphire"></div>
        <div class="swatch" data-color="green" style="background:#2a5a30" title="Verdigris"></div>
        <div class="swatch" data-color="purple" style="background:#5a2a7a" title="Violet"></div>
        <div class="swatch" data-color="gold" style="background:#8a6a1a" title="Gilded"></div>
        <div class="swatch" data-color="black" style="background:#1a1a2a" title="Pitch Black"></div>
        <div class="swatch" data-color="white" style="background:#b0a898" title="Pale Marble"></div>
        <div class="swatch" data-color="cyan" style="background:#1a6a7a" title="Frozen"></div>
        <div class="swatch" data-color="orange" style="background:#9a5010" title="Sandstone"></div>
        <div class="swatch" data-color="moss" style="background:#3a5025" title="Mossy"></div>
      </div>

      <label>Floor Color</label>
      <div class="swatch-grid" id="floorSwatches">
        <div class="swatch active" data-color="floor-stone" style="background:#3a342c" title="Dark Stone"></div>
        <div class="swatch" data-color="floor-dirt" style="background:#4a3820" title="Dirt Floor"></div>
        <div class="swatch" data-color="floor-marble" style="background:#706858" title="Marble"></div>
        <div class="swatch" data-color="floor-black" style="background:#121018" title="Void"></div>
        <div class="swatch" data-color="floor-sand" style="background:#8a7048" title="Sand"></div>
