<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corridor Creator 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;700&display=swap');

  :root {
    --parchment: #c8a96e;
    --ink: #1a0f00;
    --blood: #7a1e1e;
    --shadow: #0d0a06;
    --gold: #c9922a;
    --stone-light: #9e9080;
    --stone-dark: #4a4038;
    --vignette: rgba(10,6,0,0.85);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0a06;
    color: #c8a96e;
    font-family: 'IM Fell English', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(201,146,42,0.08) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none; z-index: 0;
  }

  header {
    text-align: center;
    padding: 28px 20px 12px;
    position: relative; z-index: 1;
  }

  header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(201,146,42,0.4), 2px 2px 0 rgba(0,0,0,0.8);
  }

  header p {
    font-style: italic;
    color: #a07840;
    font-size: 0.95rem;
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  .divider {
    width: 320px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 10px auto;
    position: relative;
  }
  .divider::before {
    content: '⚔';
    position: absolute; top: -9px; left: 50%;
    transform: translateX(-50%);
    color: var(--gold); font-size: 1.1rem;
    background: #0d0a06; padding: 0 8px;
  }

  /* Navigation */
  .nav-links {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .nav-links a {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--stone-light);
    text-decoration: none;
    border: 1px solid rgba(158,144,128,0.25);
    padding: 5px 14px;
    transition: color 0.25s, border-color 0.25s, background 0.25s;
  }
  .nav-links a:hover {
    color: var(--gold-bright, #e8b84b);
    border-color: rgba(201,146,42,0.5);
    background: rgba(201,146,42,0.06);
  }
  .nav-links a.nav-active {
    color: var(--gold);
    border-color: rgba(201,146,42,0.35);
    cursor: default;
  }
  .nav-sep {
    color: rgba(158,144,128,0.3);
    font-size: 0.7rem;
    font-family: 'Cinzel', serif;
  }

  .layout {
    display: flex;
    gap: 18px;
    padding: 10px 20px 30px;
    width: 100%;
    max-width: 1300px;
    position: relative; z-index: 1;
    flex-wrap: wrap;
    justify-content: center;
  }

  .controls {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 300px;
    flex-shrink: 0;
  }

  .panel {
    background: linear-gradient(160deg, rgba(30,20,10,0.95), rgba(15,10,5,0.98));
    border: 1px solid rgba(201,146,42,0.3);
    border-radius: 4px;
    padding: 14px 16px;
    position: relative;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,146,42,0.1);
  }

  .panel::before {
    content: '';
    position: absolute; inset: 2px;
    border: 1px solid rgba(201,146,42,0.08);
    border-radius: 3px;
    pointer-events: none;
  }

  .panel-title {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(201,146,42,0.2);
  }

  label {
    display: block;
    font-size: 0.78rem;
    color: #a07840;
    margin-bottom: 3px;
    letter-spacing: 0.06em;
  }

  select, input[type="range"], input[type="text"], textarea {
    width: 100%;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(201,146,42,0.25);
    color: var(--parchment);
    font-family: 'IM Fell English', serif;
    font-size: 0.85rem;
    padding: 6px 10px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 10px;
  }

  select:focus, input:focus, textarea:focus {
    border-color: rgba(201,146,42,0.6);
    box-shadow: 0 0 8px rgba(201,146,42,0.15);
  }

  select option { background: #1a0f00; }

  input[type="range"] {
    padding: 0;
    height: 6px;
    cursor: pointer;
    accent-color: var(--gold);
    margin-bottom: 4px;
  }

  .range-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .range-row input { margin-bottom: 0; flex: 1; }
  .range-val {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 0.8rem;
    min-width: 32px;
    text-align: right;
  }

  /* Ratio grid */
  .ratio-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
    margin-bottom: 10px;
  }

  .ratio-btn {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(201,146,42,0.2);
    color: #a07840;
    padding: 6px 4px;
    cursor: pointer;
    border-radius: 2px;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.04em;
    text-align: center;
    transition: all 0.2s;
    display: flex; flex-direction: column;
    align-items: center; gap: 3px;
  }

  .ratio-btn:hover { border-color: rgba(201,146,42,0.5); color: var(--parchment); }
  .ratio-btn.active {
    background: rgba(201,146,42,0.15);
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 10px rgba(201,146,42,0.2);
  }

  /* Direction buttons */
  .dir-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 10px;
  }

  .dir-btn {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(201,146,42,0.2);
    color: #a07840;
    padding: 7px 4px;
    cursor: pointer;
    border-radius: 2px;
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    letter-spacing: 0.05em;
    text-align: center;
    transition: all 0.2s;
    display: flex; flex-direction: column;
    align-items: center; gap: 3px;
  }

  .dir-btn:hover { border-color: rgba(201,146,42,0.5); color: var(--parchment); }
  .dir-btn.active {
    background: rgba(201,146,42,0.15);
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 10px rgba(201,146,42,0.2);
  }

  /* Color swatches */
  .swatch-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 5px;
    margin-bottom: 10px;
  }

  .swatch {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 2px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
  }

  .swatch:hover { transform: scale(1.1); }
  .swatch.active {
    border-color: var(--gold);
    box-shadow: 0 0 8px rgba(201,146,42,0.5);
  }

  .swatch::after {
    content: '✓';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; color: rgba(255,255,255,0.9);
    opacity: 0;
    text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  }
  .swatch.active::after { opacity: 1; }

  /* Feature toggles */
  .feature-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 6px;
  }

  .feat-btn {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(201,146,42,0.2);
    color: #806030;
    padding: 6px 8px;
    cursor: pointer;
    border-radius: 2px;
    font-family: 'IM Fell English', serif;
    font-size: 0.8rem;
    transition: all 0.2s;
  }

  .feat-btn:hover { border-color: rgba(201,146,42,0.4); color: var(--parchment); }
  .feat-btn.active {
    background: rgba(122,30,30,0.3);
    border-color: rgba(180,60,60,0.5);
    color: #e09090;
  }

  /* Generate button */
  .gen-btn {
    width: 100%;
    background: linear-gradient(160deg, rgba(201,146,42,0.2), rgba(122,30,30,0.2));
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 12px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border-radius: 2px;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .gen-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(201,146,42,0.1), transparent);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }

  .gen-btn:hover::before { transform: translateX(100%); }
  .gen-btn:hover {
    background: linear-gradient(160deg, rgba(201,146,42,0.3), rgba(122,30,30,0.3));
    box-shadow: 0 0 20px rgba(201,146,42,0.3);
  }

  .gen-btn:active { transform: scale(0.98); }

  textarea {
    resize: vertical;
    min-height: 80px;
    font-size: 0.8rem;
    line-height: 1.5;
  }

  .ai-btn {
    width: 100%;
    background: linear-gradient(160deg, rgba(30,60,122,0.25), rgba(10,20,50,0.4));
    border: 1px solid rgba(100,140,220,0.4);
    color: #90b0f0;
    padding: 9px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    border-radius: 2px;
    transition: all 0.25s;
    margin-bottom: 0;
  }

  .ai-btn:hover {
    border-color: rgba(100,140,220,0.7);
    box-shadow: 0 0 15px rgba(100,140,220,0.2);
  }

  .ai-status {
    font-size: 0.75rem;
    font-style: italic;
    color: #807060;
    margin-top: 6px;
    min-height: 18px;
    text-align: center;
  }

  /* CANVAS AREA */
  .canvas-wrap {
    flex: 1;
    min-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 700px;
  }

  .map-frame {
    background: #080504;
    border: 2px solid rgba(201,146,42,0.4);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.8),
      0 8px 40px rgba(0,0,0,0.8),
      inset 0 0 60px rgba(0,0,0,0.5);
  }

  .map-frame::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 2;
  }

  .corner {
    position: absolute;
    width: 28px; height: 28px;
    border-color: rgba(201,146,42,0.5);
    border-style: solid;
    z-index: 3;
  }
  .corner.tl { top: 6px; left: 6px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 6px; right: 6px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 6px; left: 6px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 6px; right: 6px; border-width: 0 2px 2px 0; }

  canvas {
    display: block;
    width: 100%;
    image-rendering: pixelated;
  }

  .dl-btn {
    width: 100%;
    background: linear-gradient(160deg, rgba(20,60,40,0.3), rgba(10,30,20,0.4));
    border: 1px solid rgba(80,180,100,0.45);
    color: #80c890;
    padding: 10px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 0.82rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-radius: 2px;
    transition: all 0.25s;
    overflow: hidden;
  }

  .dl-btn:hover {
    background: linear-gradient(160deg, rgba(20,60,40,0.5), rgba(10,30,20,0.6));
    border-color: rgba(80,180,100,0.8);
    box-shadow: 0 0 16px rgba(80,180,100,0.25);
    color: #a0e8b0;
  }

  .dl-btn:active { transform: scale(0.98); }

  .description-box {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(201,146,42,0.15);
    border-radius: 3px;
    padding: 10px 14px;
    font-size: 0.82rem;
    color: #b09070;
    line-height: 1.7;
    font-style: italic;
    min-height: 48px;
  }

  /* End config row */
  .end-row {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }

  .end-btn {
    flex: 1;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(201,146,42,0.2);
    color: #a07840;
    padding: 7px 4px;
    cursor: pointer;
    border-radius: 2px;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    text-align: center;
    transition: all 0.2s;
  }

  .end-btn:hover { border-color: rgba(201,146,42,0.5); color: var(--parchment); }
  .end-btn.active {
    background: rgba(201,146,42,0.15);
    border-color: var(--gold);
    color: var(--gold);
  }

  .door-counter {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 10px;
    border: 1px solid rgba(201,146,42,0.2);
    border-radius: 2px;
    overflow: hidden;
  }
  .door-dec, .door-inc {
    background: rgba(0,0,0,0.4);
    border: none;
    color: #a07840;
    font-size: 1.1rem;
    width: 36px;
    height: 32px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Cinzel', serif;
  }
  .door-dec:hover, .door-inc:hover {
    background: rgba(201,146,42,0.15);
    color: var(--gold);
  }
  .door-count-val {
    flex: 1;
    text-align: center;
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    background: rgba(0,0,0,0.2);
    padding: 6px 0;
  }
</style>
</head>
<body>

<header>
  <h1>Corridor Creator 2026</h1>
  <div class="divider"></div>
  <p>Carve thy passage through stone and shadow</p>
  <nav class="nav-links">
    <a href="index.html">&#8962; Home</a>
    <span class="nav-sep">&#9670;</span>
    <a href="chamber-creator.html">&#9647; Chambers</a>
    <span class="nav-sep">&#9670;</span>
    <a class="nav-active" href="corridor-creator.html">&#10230; Corridors</a>
  </nav>
</header>

<div class="layout">

  <!-- LEFT CONTROLS -->
  <div class="controls">

    <div class="panel">
      <div class="panel-title">✦ Corridor Orientation</div>
      <div class="dir-grid">
        <button class="dir-btn active" data-dir="horizontal">
          <svg width="32" height="18" viewBox="0 0 32 18"><rect x="0" y="6" width="32" height="6" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          Horizontal
        </button>
        <button class="dir-btn" data-dir="vertical">
          <svg width="18" height="32" viewBox="0 0 18 32"><rect x="6" y="0" width="6" height="32" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          Vertical
        </button>
      </div>

      <div class="panel-title" style="margin-top:4px">✦ Length : Width Ratio</div>
      <div class="ratio-grid" id="ratioGrid">
        <button class="ratio-btn" data-ratio="2">
          <svg width="28" height="18" viewBox="0 0 28 18"><rect x="0" y="4" width="28" height="10" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
          2:1
        </button>
        <button class="ratio-btn active" data-ratio="3">
          <svg width="28" height="14" viewBox="0 0 28 14"><rect x="0" y="2" width="28" height="10" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
          3:1
        </button>
        <button class="ratio-btn" data-ratio="4">
          <svg width="28" height="12" viewBox="0 0 28 12"><rect x="0" y="1" width="28" height="10" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
          4:1
        </button>
        <button class="ratio-btn" data-ratio="6">
          <svg width="28" height="10" viewBox="0 0 28 10"><rect x="0" y="1" width="28" height="8" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
          6:1
        </button>
        <button class="ratio-btn" data-ratio="8">
          <svg width="28" height="8" viewBox="0 0 28 8"><rect x="0" y="1" width="28" height="6" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
          8:1
        </button>
        <button class="ratio-btn" data-ratio="10">
          <svg width="28" height="7" viewBox="0 0 28 7"><rect x="0" y="1" width="28" height="5" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
          10:1
        </button>
        <button class="ratio-btn" data-ratio="1.5">
          <svg width="28" height="20" viewBox="0 0 28 20"><rect x="0" y="3" width="28" height="14" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
          1.5:1
        </button>
        <button class="ratio-btn" data-ratio="custom">
          <svg width="28" height="16" viewBox="0 0 28 16"><rect x="0" y="3" width="28" height="10" stroke="currentColor" stroke-width="1.2" fill="none" stroke-dasharray="3,2"/></svg>
          Custom
        </button>
      </div>

      <div id="customRatioRow" style="display:none">
        <label>Length Units (X)</label>
        <div class="range-row">
          <input type="range" id="ratioXSlider" min="1" max="20" value="3">
          <span class="range-val" id="ratioXVal">3</span>
        </div>
        <label>Width Units (Y)</label>
        <div class="range-row">
          <input type="range" id="ratioYSlider" min="1" max="10" value="1">
          <span class="range-val" id="ratioYVal">1</span>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">✦ Dimensions</div>
      <label>Corridor Scale</label>
      <div class="range-row">
        <input type="range" id="scaleSlider" min="30" max="95" value="70">
        <span class="range-val" id="scaleVal">70%</span>
      </div>
      <label>Wall Thickness</label>
      <div class="range-row">
        <input type="range" id="wallSlider" min="3" max="20" value="9">
        <span class="range-val" id="wallVal">9</span>
      </div>
      <label>Ceiling Height (depth shadow)</label>
      <div class="range-row">
        <input type="range" id="heightSlider" min="0" max="8" value="8">
        <span class="range-val" id="heightVal">8</span>
      </div>


      <label>Corridor Ends</label>
      <div class="end-row">
        <button class="end-btn active" data-end="open">Open</button>
        <button class="end-btn" data-end="none">None</button>
      </div>

      <label>Number of Column Pairs</label>
      <div class="door-counter">
        <button class="door-dec" id="colDec">−</button>
        <span class="door-count-val" id="colCountVal">2</span>
        <button class="door-inc" id="colInc">+</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">✦ Wall Material</div>
      <select id="materialSelect">
        <optgroup label="── Fantasy / Ancient ──">
          <option value="stone">Rough Stone</option>
          <option value="brick">Fitted Brick</option>
          <option value="marble">Polished Marble</option>
          <option value="wood">Wooden Planks</option>
          <option value="obsidian">Obsidian</option>
          <option value="ice">Glacial Ice</option>
          <option value="dirt">Earthen Dirt</option>
          <option value="sandstone">Sandstone</option>
          <option value="crystal">Crystal</option>
        </optgroup>
        <optgroup label="── Modern / Sci-Fi ──">
          <option value="smooth">Smooth Plaster</option>
          <option value="concrete">Poured Concrete</option>
          <option value="office">Office Drywall</option>
          <option value="spacestation">Space Station Hull</option>
          <option value="martian">Martian Bedrock</option>
        </optgroup>
      </select>

      <label>Wall Color Tint</label>
      <div class="swatch-grid" id="wallSwatches">
        <div class="swatch active" data-color="stone" style="background:#6e6358" title="Stone Grey"></div>
        <div class="swatch" data-color="brown" style="background:#7a5030" title="Earth Brown"></div>
        <div class="swatch" data-color="red" style="background:#8b3030" title="Blood Red"></div>
        <div class="swatch" data-color="blue" style="background:#2a4a7a" title="Sapphire"></div>
        <div class="swatch" data-color="green" style="background:#2a5a30" title="Verdigris"></div>
        <div class="swatch" data-color="purple" style="background:#5a2a7a" title="Violet"></div>

        <div class="swatch" data-color="floor-wood" style="background:#5a3820" title="Wood"></div>
        <div class="swatch" data-color="floor-moss" style="background:#283820" title="Overgrown"></div>
        <div class="swatch" data-color="floor-tile" style="background:#444038" title="Tile"></div>
        <div class="swatch" data-color="floor-void" style="background:#080610" title="Abyss"></div>

    <div class="panel">
      <div class="panel-title">✦ Corridor Features</div>
      <div class="feature-grid" id="featureGrid">
        <button class="feat-btn" data-feat="torches">🔥 Torches</button>
        <button class="feat-btn active" data-feat="pillars">◉ Pillars</button>
        <button class="feat-btn" data-feat="cracks">⌇ Cracks</button>
        <button class="feat-btn" data-feat="rubble">⬡ Rubble</button>
        <button class="feat-btn" data-feat="bloodstains">✦ Stains</button>
        <button class="feat-btn" data-feat="chains">⛓ Chains</button>
        <button class="feat-btn" data-feat="chest">⬢ Chest</button>
        <button class="feat-btn" data-feat="pit">⬡ Pit</button>
        <button class="feat-btn" data-feat="barrel">⬡ Barrels</button>

      <select id="lightingSelect">
        <option value="torchlit">Torchlit</option>
        <option value="dim">Dim / Shadowy</option>
        <option value="bright">Bright Magical</option>
        <option value="unlit">Unlit (Darkness)</option>
        <option value="bioluminescent">Bioluminescent</option>
        <option value="hellish">Hellfire</option>

      </select>

  </div>

  <!-- RIGHT: MAP -->
  <div class="canvas-wrap">
    <div class="map-frame">
      <canvas id="corridorCanvas" width="680" height="680"></canvas>
    </div>

    <div class="description-box" id="descBox">
      <em>Corridor awaits cartography...</em>
    </div>

    <button class="dl-btn" id="dlBtn">⬇ Download Transparent PNG</button>
  </div>

</div>

<script>
const canvas = document.getElementById('corridorCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

// ─── State ───────────────────────────────────────────────
let state = {
  direction: 'horizontal', // horizontal | vertical
  ratio: 3,                // length:width
  customX: 3,
  customY: 1,
  scale: 70,
  wallThick: 9,
  heightShadow: 8,
  material: 'stone',
  wallColor: 'stone',
  floorColor: 'floor-stone',
  features: new Set(['pillars']),
  lighting: 'torchlit',
  ends: 'open',
  columns: 2,
  seed: Math.random() * 10000 | 0,
};

// ─── Color Palettes (identical to Chamber Creator) ────────
const WALL_COLORS = {
  stone:   { base: '#6e6358', dark: '#3c362d', light: '#9e9080', accent: '#8a7e6a' },
  brown:   { base: '#7a5030', dark: '#4a2a10', light: '#aa7050', accent: '#9a6040' },
  red:     { base: '#8b3030', dark: '#5a1818', light: '#bc5050', accent: '#a04040' },
  blue:    { base: '#2a4a7a', dark: '#162438', light: '#4a6aaa', accent: '#3a5a8a' },
  green:   { base: '#2a5a30', dark: '#142a18', light: '#4a8a50', accent: '#3a6a40' },
  purple:  { base: '#5a2a7a', dark: '#2c1240', light: '#8a4aaa', accent: '#6a3a8a' },
  gold:    { base: '#8a6a1a', dark: '#4a380a', light: '#c09030', accent: '#a07820' },
  black:   { base: '#1a1a2a', dark: '#0a0a14', light: '#2a2a3a', accent: '#222232' },
  white:   { base: '#b0a898', dark: '#706860', light: '#d0c8c0', accent: '#c0b8a8' },
  cyan:    { base: '#1a6a7a', dark: '#0a3040', light: '#3a9aaa', accent: '#2a7a8a' },
  orange:  { base: '#9a5010', dark: '#501808', light: '#ca7030', accent: '#b06020' },
  moss:    { base: '#3a5025', dark: '#1c2812', light: '#5a7840', accent: '#4a6030' },
};

const FLOOR_COLORS = {
  'floor-stone':  { base: '#3a342c', dark: '#201c16', mid: '#4e4840', light: '#605a50' },
  'floor-dirt':   { base: '#4a3820', dark: '#2a1e0e', mid: '#5e4c2e', light: '#7a6040' },
  'floor-marble': { base: '#706858', dark: '#504840', mid: '#847a6c', light: '#988e80' },
  'floor-black':  { base: '#121018', dark: '#08060e', mid: '#1c1a24', light: '#28253a' },
  'floor-sand':   { base: '#8a7048', dark: '#5a4828', mid: '#a08860', light: '#c0a880' },
  'floor-water':  { base: '#1a3060', dark: '#0e1c3e', mid: '#243e78', light: '#3a5498', special: 'water' },
  'floor-lava':   { base: '#501008', dark: '#300804', mid: '#702010', light: '#a04020', special: 'lava' },
  'floor-ice':    { base: '#204060', dark: '#102030', mid: '#304e78', light: '#506898', special: 'ice' },
  'floor-wood':   { base: '#5a3820', dark: '#3a2010', mid: '#6e4a2a', light: '#8a6040' },
  'floor-moss':   { base: '#283820', dark: '#141c10', mid: '#384c2e', light: '#4a6040' },
  'floor-tile':   { base: '#444038', dark: '#2a2822', mid: '#58524a', light: '#6c6660', special: 'tile' },
  'floor-void':   { base: '#080610', dark: '#040308', mid: '#100c1a', light: '#1c1828', special: 'void' },
};

// ─── RNG ──────────────────────────────────────────────────
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ─── Compute corridor rect ────────────────────────────────
function getCorridorRect() {
  const cx = W / 2, cy = H / 2;
  const maxDim = Math.min(W, H) * (state.scale / 100);
  const ratio = state.ratio === 'custom' ? (state.customX / state.customY) : parseFloat(state.ratio);

  let cw, ch;
  if (state.direction === 'horizontal') {
    // width along X, height along Y
    // ratio = length/width, so cw/ch = ratio
    // Constrain so longest dim ≤ maxDim
    if (ratio >= 1) {
      cw = maxDim;
      ch = maxDim / ratio;
    } else {
      ch = maxDim;
      cw = maxDim * ratio;
    }
  } else {
    if (ratio >= 1) {
      ch = maxDim;
      cw = maxDim / ratio;
    } else {
      cw = maxDim;
      ch = maxDim * ratio;
    }
  }

  return {
    cx, cy,
    left: cx - cw / 2,
    top: cy - ch / 2,
    right: cx + cw / 2,
    bottom: cy + ch / 2,
    width: cw,
    height: ch,
  };
}

// ─── Main Draw ────────────────────────────────────────────
function draw() {
  const rng = mulberry32(state.seed);
  ctx.clearRect(0, 0, W, H);

  const wallColors = WALL_COLORS[state.wallColor] || WALL_COLORS.stone;
  const floorC = FLOOR_COLORS[state.floorColor] || FLOOR_COLORS['floor-stone'];
  const r = getCorridorRect();
  const wallW = Math.max(r.width, r.height) * (state.wallThick / 100);

  // Background
  ctx.fillStyle = '#05030a';
  ctx.fillRect(0, 0, W, H);
  drawBgTexture(rng, wallColors);

  // Outer wall rect (with wall thickness)
  const ox = r.left - wallW;
  const oy = r.top - wallW;
  const ow = r.width + wallW * 2;
  const oh = r.height + wallW * 2;

  const isH = state.direction === 'horizontal';
  const noneEnds = state.ends === 'none';

  // Build outer and inner paths.
  // For 'none' ends the outer path only covers the two side walls (no end caps).
  // The inner (floor) path also extends to the full outer span so the interior matches.
  const outerPath = new Path2D();
  const innerPath = new Path2D();

  if (noneEnds) {
    if (isH) {
      // Floor is exactly the interior — no east/west bleed
      innerPath.rect(r.left, r.top, r.width, r.height);
      // North and south strips span only the floor interior width
      outerPath.rect(r.left, oy, r.width, wallW);        // north strip
      outerPath.rect(r.left, r.bottom, r.width, wallW);  // south strip
    } else {
      // Floor is exactly the interior — no north/south bleed
      innerPath.rect(r.left, r.top, r.width, r.height);
      // West and east strips span only the floor interior height
      outerPath.rect(ox, r.top, wallW, r.height);        // west strip
      outerPath.rect(r.right, r.top, wallW, r.height);   // east strip
    }
  } else {
    innerPath.rect(r.left, r.top, r.width, r.height);
    outerPath.rect(ox, oy, ow, oh);
  }

  // Shadow / height (draw on full outer area first)
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.9)';
  ctx.shadowBlur = 30;
  ctx.shadowOffsetX = state.heightShadow * 0.7;
  ctx.shadowOffsetY = state.heightShadow;
  ctx.fillStyle = wallColors.dark;
  ctx.fill(outerPath);
  ctx.restore();

  // Wall material
  drawWallMaterialRect(outerPath, innerPath, wallColors, rng);

  // Floor
  const floorRect = { left: r.left, top: r.top, width: r.width, height: r.height };

  ctx.save();
  ctx.beginPath();
  ctx.rect(floorRect.left, floorRect.top, floorRect.width, floorRect.height);
  ctx.clip();
  drawFloor(r.cx, r.cy, Math.min(r.width, r.height) * 0.5, floorC, rng, floorRect);
  ctx.restore();

  // Lighting (corridor-aware: linear gradient along the length)
  drawCorridorLighting(r, state.lighting, rng);

  // Features
  if (state.features.has('cracks'))      drawCorridorCracks(r, floorC, rng);
  if (state.features.has('pit'))         drawCorridorPit(r, rng);
  if (state.features.has('pillars'))     drawCorridorPillars(r, wallColors, rng);
  if (state.features.has('torches'))     drawCorridorTorches(r, rng);
  if (state.features.has('rubble'))      drawCorridorRubble(r, wallColors, rng);
  if (state.features.has('bloodstains')) drawCorridorBlood(r, rng);
  if (state.features.has('chains'))      drawCorridorChains(r, rng);
  if (state.features.has('chest'))       drawCorridorChest(r, rng);
  if (state.features.has('barrel'))      drawCorridorBarrels(r, wallColors, rng);
  if (state.features.has('bones'))       drawCorridorBones(r, rng);

  // Corridor ends
  drawCorridorEnds(r, wallColors, wallW, rng);

  // Wall edge highlights
  if (noneEnds) {
    // Only stroke the two long inner edges (the sides that have walls)
    ctx.save();
    ctx.beginPath();
    if (isH) {
      // Only stroke over the floor interior width
      ctx.moveTo(r.left, r.top); ctx.lineTo(r.right, r.top);
      ctx.moveTo(r.left, r.bottom); ctx.lineTo(r.right, r.bottom);
    } else {
      // Only stroke over the floor interior height
      ctx.moveTo(r.left, r.top); ctx.lineTo(r.left, r.bottom);
      ctx.moveTo(r.right, r.top); ctx.lineTo(r.right, r.bottom);
    }
    ctx.strokeStyle = wallColors.light + '60'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.strokeStyle = wallColors.dark + '80';  ctx.lineWidth = 3;   ctx.stroke();
    ctx.restore();
    // Outer edges of wall strips
    ctx.fill(outerPath);
    ctx.strokeStyle = wallColors.dark; ctx.lineWidth = 2; ctx.stroke(outerPath);
  } else {
    ctx.strokeStyle = wallColors.light + '60';
    ctx.lineWidth = 1.5;
    ctx.stroke(innerPath);
    ctx.strokeStyle = wallColors.dark + '80';
    ctx.lineWidth = 3;
    ctx.stroke(innerPath);
    ctx.strokeStyle = wallColors.dark;
    ctx.lineWidth = 2;
    ctx.stroke(outerPath);
  }

  updateDescription();
}

// ─── Background texture ────────────────────────────────────
function drawBgTexture(rng, wallColors) {
  const imageData = ctx.createImageData(W, H);
  const d = imageData.data;
  for (let i = 0; i < d.length; i += 4) {
    const n = (rng() * 20) | 0;
    d[i]   = 5 + n;
    d[i+1] = 3 + (n * 0.7) | 0;
    d[i+2] = 8 + n;
    d[i+3] = 255;
  }
  ctx.putImageData(imageData, 0, 0);
}

// ─── Wall Material (rect version) ─────────────────────────
function drawWallMaterialRect(outerPath, innerPath, wallColors, rng) {
  ctx.save();
  ctx.clip(outerPath);
  ctx.fillStyle = wallColors.base;
  ctx.fill(outerPath);

  const mat = state.material;
  if (mat === 'brick' || mat === 'stone')  drawStonework(rng, wallColors, mat);
  else if (mat === 'marble')               drawMarbleVeins(rng, wallColors);
  else if (mat === 'wood')                 drawWoodGrain(rng, wallColors);
  else if (mat === 'obsidian')             drawObsidian(rng, wallColors);
  else if (mat === 'ice')                  drawIceCrystals(rng, wallColors);
  else if (mat === 'dirt')                 drawDirtTexture(rng, wallColors);
  else if (mat === 'sandstone')            drawSandstone(rng, wallColors);
  else if (mat === 'crystal')              drawCrystal(rng, wallColors);
  else if (mat === 'smooth')               drawSmooth(rng, wallColors);
  else if (mat === 'concrete')             drawConcrete(rng, wallColors);
  else if (mat === 'office')               drawOffice(rng, wallColors);
  else if (mat === 'spacestation')         drawSpaceStation(rng, wallColors);
  else if (mat === 'martian')              drawMartian(rng, wallColors);

  ctx.globalCompositeOperation = 'destination-out';
  ctx.fill(innerPath);
  ctx.globalCompositeOperation = 'source-over';
  ctx.restore();
}

// ─── Material functions (verbatim from Chamber Creator) ───
function drawStonework(rng, wallColors, type) {
  const step = type === 'brick' ? 18 : 22 + (rng() * 10 | 0);
  const halfStep = step * 0.5;
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.strokeStyle = wallColors.dark;
  ctx.lineWidth = type === 'brick' ? 1.5 : 1;
  for (let y = -step; y < H + step; y += step * 0.6) {
    const offset = (Math.floor(y / (step * 0.6)) % 2) * halfStep;
    for (let x = -step + offset; x < W + step; x += step) {
      const w = step * (0.85 + rng() * 0.3);
      const h = step * (0.55 + rng() * 0.2);
      ctx.strokeRect(x + rng() * 3, y + rng() * 3, w, h);
    }
  }
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = wallColors.light;
  for (let i = 0; i < 200; i++) {
    ctx.fillRect(rng() * W, rng() * H, rng() * 3 + 1, rng() * 2 + 1);
  }
  ctx.restore();
}

function drawMarbleVeins(rng, wallColors) {
  ctx.save();
  for (let i = 0; i < 8; i++) {
    const x0 = rng() * W, y0 = rng() * H;
    const x1 = x0 + (rng() - 0.5) * 400;
    const y1 = y0 + (rng() - 0.5) * 400;
    const grad = ctx.createLinearGradient(x0, y0, x1, y1);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(0.5, wallColors.light + '40');
    grad.addColorStop(1, 'transparent');
    ctx.strokeStyle = grad;
    ctx.lineWidth = rng() * 2 + 0.5;
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.bezierCurveTo(x0 + rng() * 100, y0 + rng() * 100, x1 - rng() * 100, y1 - rng() * 100, x1, y1);
    ctx.stroke();
  }
  ctx.restore();
}

function drawWoodGrain(rng, wallColors) {
  ctx.save();
  ctx.globalAlpha = 0.2;
  const planks = 12, plankW = W / planks;
  for (let i = 0; i < planks; i++) {
    ctx.strokeStyle = i % 2 === 0 ? wallColors.dark : wallColors.light;
    ctx.lineWidth = plankW - 1;
    ctx.beginPath();
    ctx.moveTo(i * plankW + plankW/2, 0);
    ctx.lineTo(i * plankW + plankW/2 + (rng() - 0.5) * 20, H);
    ctx.stroke();
  }
  ctx.globalAlpha = 0.15;
  ctx.strokeStyle = wallColors.dark;
  for (let i = 0; i < 8; i++) {
    ctx.beginPath();
    ctx.ellipse(rng()*W, rng()*H, 8+rng()*12, 5+rng()*8, rng()*Math.PI, 0, Math.PI*2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawObsidian(rng, wallColors) {
  ctx.save();
  ctx.globalAlpha = 0.15;
  for (let i = 0; i < 20; i++) {
    const x = rng()*W, y = rng()*H;
    const grad = ctx.createRadialGradient(x, y, 0, x, y, 60 + rng()*80);
    grad.addColorStop(0, wallColors.light + '80');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }
  ctx.restore();
}

function drawIceCrystals(rng, wallColors) {
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.strokeStyle = wallColors.light;
  for (let i = 0; i < 30; i++) {
    const x = rng()*W, y = rng()*H, r = 20 + rng()*40, arms = 6;
    ctx.lineWidth = 0.8;
    for (let j = 0; j < arms; j++) {
      const a = (Math.PI*2/arms)*j;
      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+r*Math.cos(a), y+r*Math.sin(a)); ctx.stroke();
      const bx = x+r*0.5*Math.cos(a), by = y+r*0.5*Math.sin(a);
      ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+r*0.3*Math.cos(a+Math.PI/3), by+r*0.3*Math.sin(a+Math.PI/3)); ctx.stroke();
    }
  }
  ctx.restore();
}

function drawDirtTexture(rng, wallColors) {
  ctx.save();
  ctx.globalAlpha = 0.2;
  for (let i = 0; i < 500; i++) {
    ctx.fillStyle = rng() > 0.5 ? wallColors.dark : wallColors.light;
    ctx.beginPath();
    ctx.arc(rng()*W, rng()*H, rng()*3+0.5, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawSandstone(rng, wallColors) {
  ctx.save();
  ctx.globalAlpha = 0.15;
  for (let y = 0; y < H; y += 8 + rng()*6) {
    ctx.strokeStyle = rng() > 0.5 ? wallColors.light : wallColors.dark;
    ctx.lineWidth = 0.5 + rng();
    ctx.beginPath(); ctx.moveTo(0, y + (rng()-0.5)*4);
    for (let x = 0; x < W; x += 20) ctx.lineTo(x, y + (rng()-0.5)*4);
    ctx.stroke();
  }
  ctx.restore();
}

function drawCrystal(rng, wallColors) {
  ctx.save();
  ctx.globalAlpha = 0.18;
  for (let i = 0; i < 40; i++) {
    const x = rng()*W, y = rng()*H, h2 = 20+rng()*50, w2 = 8+rng()*20, a = rng()*Math.PI;
    ctx.save(); ctx.translate(x,y); ctx.rotate(a);
    ctx.beginPath(); ctx.moveTo(0,-h2/2); ctx.lineTo(w2/2,0); ctx.lineTo(0,h2/2); ctx.lineTo(-w2/2,0); ctx.closePath();
    ctx.strokeStyle = wallColors.light; ctx.lineWidth = 0.8; ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}

function drawSmooth(rng, wallColors) {
  ctx.save();
  ctx.globalAlpha = 0.06;
  for (let i = 0; i < 100; i++) {
    ctx.fillStyle = rng() > 0.5 ? wallColors.light : wallColors.dark;
    ctx.fillRect(rng()*W, rng()*H, rng()*8+1, rng()*4+1);
  }
  ctx.restore();
}

function drawConcrete(rng, wallColors) {
  ctx.save();
  ctx.globalAlpha = 0.2;
  ctx.fillStyle = wallColors.dark;
  for (let i = 0; i < 8; i++) {
    ctx.fillRect(rng()*W, rng()*H*0.5, rng()*W*0.6+20, 8+rng()*6);
  }
  ctx.globalAlpha = 0.2;
  ctx.strokeStyle = wallColors.dark;
  ctx.lineWidth = 2;
  for (let i = 0; i < 8; i++) {
    ctx.beginPath(); ctx.moveTo(rng()*W, rng()*H*0.5); ctx.lineTo(rng()*W, rng()*H*0.5+40+rng()*60); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawOffice(rng, wallColors) {
  ctx.save();
  const pw = 96, ph = 192;
  ctx.globalAlpha = 0.12; ctx.strokeStyle = wallColors.dark; ctx.lineWidth = 1;
  for (let x = 0; x < W+pw; x += pw) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H+ph; y += ph) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.globalAlpha = 0.18; ctx.fillStyle = wallColors.dark;
  for (let x = 16; x < W; x += pw) for (let y = 16; y < H; y += 32) {
    ctx.beginPath(); ctx.arc(x,y,1.5,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 0.25; ctx.fillStyle = wallColors.dark;
  ctx.fillRect(0, H-14, W, 14);
  ctx.globalAlpha = 1; ctx.restore();
}

function drawSpaceStation(rng, wallColors) {
  ctx.save();
  const panW = 60+(rng()*20|0), panH = 40+(rng()*20|0);
  ctx.globalAlpha = 0.22; ctx.strokeStyle = wallColors.dark; ctx.lineWidth = 2;
  for (let x = 0; x < W+panW; x += panW) for (let y = 0; y < H+panH; y += panH)
    ctx.strokeRect(x+2, y+2, panW-4, panH-4);
  ctx.globalAlpha = 0.28; ctx.fillStyle = wallColors.accent;
  for (let x = panW; x < W; x += panW) for (let y = panH; y < H; y += panH) {
    ctx.beginPath(); ctx.arc(x,y,2.5,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1; ctx.restore();
}

function drawMartian(rng, wallColors) {
  ctx.save();
  ctx.globalAlpha = 0.2;
  let y = 0;
  while (y < H) {
    const bandH = 6 + rng()*18, shade = rng();
    ctx.fillStyle = shade > 0.6 ? wallColors.light+'40' : shade > 0.3 ? wallColors.base+'60' : wallColors.dark+'50';
    ctx.fillRect(0, y, W, bandH); y += bandH;
  }
  ctx.globalAlpha = 0.3; ctx.strokeStyle = wallColors.dark; ctx.lineWidth = 1;
  for (let i = 0; i < 18; i++) {
    const sx = rng()*W, sy = rng()*H;
    ctx.beginPath(); ctx.moveTo(sx,sy);
    let lx = sx, ly = sy;
    for (let j = 0; j < 4; j++) {
      const angle = Math.round(rng()*4)*(Math.PI/4)+(rng()-0.5)*0.3;
      const len = 15+rng()*35;
      lx += Math.cos(angle)*len; ly += Math.sin(angle)*len;
      ctx.lineTo(lx,ly);
    }
    ctx.stroke();
  }
  ctx.globalAlpha = 1; ctx.restore();
}

// ─── Floor ────────────────────────────────────────────────
function drawFloor(cx, cy, r, floorC, rng, floorRect) {
  ctx.fillStyle = floorC.base;
  ctx.fillRect(floorRect.left, floorRect.top, floorRect.width, floorRect.height);
  const special = floorC.special;
  if (special === 'water')       drawWaterFloor(floorRect, floorC, rng);
  else if (special === 'lava')   drawLavaFloor(floorRect, floorC, rng);
  else if (special === 'ice')    drawIceFloor(floorRect, floorC, rng);
  else if (special === 'tile')   drawTileFloor(floorRect, floorC, rng);
  else if (special === 'void')   drawVoidFloor(floorRect, floorC, rng);
  else                           drawGenericFloor(floorRect, floorC, rng);
}

function drawGenericFloor(fr, floorC, rng) {
  for (let i = 0; i < 600; i++) {
    const x = fr.left + rng() * fr.width;
    const y = fr.top  + rng() * fr.height;
    ctx.fillStyle = rng() > 0.5 ? floorC.dark : floorC.mid;
    ctx.globalAlpha = 0.3;
    ctx.fillRect(x, y, rng()*5+1, rng()*3+1);
  }
  ctx.globalAlpha = 1;
}

function drawWaterFloor(fr, floorC, rng) {
  for (let i = 0; i < 16; i++) {
    const x = fr.left + rng()*fr.width, y = fr.top + rng()*fr.height;
    const wr = 10+rng()*30;
    ctx.beginPath();
    ctx.ellipse(x,y,wr,wr*0.35,rng()*Math.PI,0,Math.PI*2);
    ctx.strokeStyle = floorC.light+'60'; ctx.lineWidth = 0.8; ctx.stroke();
  }
}

function drawLavaFloor(fr, floorC, rng) {
  ctx.globalAlpha = 0.6;
  for (let i = 0; i < 10; i++) {
    const x = fr.left+rng()*fr.width, y = fr.top+rng()*fr.height;
    ctx.strokeStyle = '#ff5010'; ctx.lineWidth = 1.5+rng()*2;
    ctx.shadowColor = '#ff4000'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.moveTo(x,y);
    let lx=x,ly=y;
    for (let j = 0; j < 4; j++) { lx+=(rng()-0.5)*40; ly+=(rng()-0.5)*40; ctx.lineTo(lx,ly); }
    ctx.stroke();
  }
  ctx.shadowBlur = 0; ctx.globalAlpha = 1;
}

function drawIceFloor(fr, floorC, rng) {
  ctx.globalAlpha = 0.15;
  for (let i = 0; i < 6; i++) {
    const x = fr.left+rng()*fr.width, y = fr.top+rng()*fr.height;
    const gr = ctx.createRadialGradient(x,y,0,x,y,60+rng()*40);
    gr.addColorStop(0,'#a0d0ff50'); gr.addColorStop(1,'transparent');
    ctx.fillStyle = gr; ctx.fillRect(fr.left, fr.top, fr.width, fr.height);
  }
  ctx.globalAlpha = 1;
}

function drawTileFloor(fr, floorC, rng) {
  const ts = 20;
  ctx.globalAlpha = 0.2;
  for (let x = fr.left; x < fr.left+fr.width+ts; x += ts) {
    for (let y = fr.top; y < fr.top+fr.height+ts; y += ts) {
      ctx.strokeStyle = (Math.floor((x+y)/ts)%2===0) ? floorC.light : floorC.dark;
      ctx.strokeRect(x,y,ts,ts);
    }
  }
  ctx.globalAlpha = 1;
}

function drawVoidFloor(fr, floorC, rng) {
  const gr = ctx.createLinearGradient(fr.left, fr.top+fr.height/2, fr.left+fr.width, fr.top+fr.height/2);
  gr.addColorStop(0,'#00000080'); gr.addColorStop(0.5,'#1a0a3080'); gr.addColorStop(1,'#00000080');
  ctx.fillStyle = gr; ctx.fillRect(fr.left, fr.top, fr.width, fr.height);
  ctx.globalAlpha = 0.4; ctx.fillStyle = '#fff';
  for (let i = 0; i < 40; i++) {
    const x = fr.left+rng()*fr.width, y = fr.top+rng()*fr.height;
    ctx.beginPath(); ctx.arc(x,y,rng()*1.5,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ─── Corridor Lighting ───────────────────────────────────
function drawCorridorLighting(r, lighting, rng) {
  ctx.save();
  ctx.beginPath();
  ctx.rect(r.left, r.top, r.width, r.height);
  ctx.clip();

  const isH = state.direction === 'horizontal';

  if (lighting === 'torchlit') {
    // Warm pools from torch positions along the corridor
    const pools = 3;
    for (let i = 0; i < pools; i++) {
      const t = (i + 0.5) / pools;
      const px = isH ? r.left + r.width * t : r.cx;
      const py = isH ? r.cy : r.top + r.height * t;
      const gr = ctx.createRadialGradient(px, py, 0, px, py, Math.max(r.width, r.height)*0.5);
      gr.addColorStop(0, 'rgba(255,180,60,0.18)');
      gr.addColorStop(0.5, 'rgba(200,120,20,0.06)');
      gr.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gr; ctx.fillRect(0,0,W,H);
    }
    // Edge shadow
    const edgeGr = isH
      ? ctx.createLinearGradient(r.left, r.cy, r.right, r.cy)
      : ctx.createLinearGradient(r.cx, r.top, r.cx, r.bottom);
    edgeGr.addColorStop(0, 'rgba(0,0,0,0.6)');
    edgeGr.addColorStop(0.15, 'rgba(0,0,0,0)');
    edgeGr.addColorStop(0.85, 'rgba(0,0,0,0)');
    edgeGr.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = edgeGr; ctx.fillRect(0,0,W,H);
    // Side wall shadow
    const sideGr = isH
      ? ctx.createLinearGradient(r.cx, r.top, r.cx, r.bottom)
      : ctx.createLinearGradient(r.left, r.cy, r.right, r.cy);
    sideGr.addColorStop(0, 'rgba(0,0,0,0.5)');
    sideGr.addColorStop(0.3, 'rgba(0,0,0,0)');
    sideGr.addColorStop(0.7, 'rgba(0,0,0,0)');
    sideGr.addColorStop(1, 'rgba(0,0,0,0.5)');
    ctx.fillStyle = sideGr; ctx.fillRect(0,0,W,H);
  } else if (lighting === 'dim') {
    ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
  } else if (lighting === 'bright') {
    ctx.fillStyle = 'rgba(220,220,255,0.08)'; ctx.fillRect(0,0,W,H);
    const sg = isH
      ? ctx.createLinearGradient(r.cx, r.top, r.cx, r.bottom)
      : ctx.createLinearGradient(r.left, r.cy, r.right, r.cy);
    sg.addColorStop(0,'rgba(0,0,0,0.2)'); sg.addColorStop(0.5,'rgba(0,0,0,0)'); sg.addColorStop(1,'rgba(0,0,0,0.2)');
    ctx.fillStyle = sg; ctx.fillRect(0,0,W,H);
  } else if (lighting === 'unlit') {
    ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0,0,W,H);
  } else if (lighting === 'bioluminescent') {
    for (let i = 0; i < 6; i++) {
      const x = r.left+rng()*r.width, y = r.top+rng()*r.height;
      const bcol = ['#00ff9080','#40ffb080','#00e06080'][i%3];
      const gr2 = ctx.createRadialGradient(x,y,0,x,y,50+rng()*30);
      gr2.addColorStop(0,bcol); gr2.addColorStop(1,'transparent');
      ctx.fillStyle = gr2; ctx.fillRect(0,0,W,H);
    }
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(0,0,W,H);
  } else if (lighting === 'hellish') {
    const gr = ctx.createLinearGradient(r.left, r.cy, r.right, r.cy);
    gr.addColorStop(0,'rgba(255,60,0,0.2)'); gr.addColorStop(0.5,'rgba(200,30,0,0.08)'); gr.addColorStop(1,'rgba(255,60,0,0.2)');
    ctx.fillStyle = gr; ctx.fillRect(0,0,W,H);
  } else if (lighting === 'fluorescent') {
    const isH = state.direction === 'horizontal';

    // Strong flat blue-white ambient base — banishes most darkness
    ctx.fillStyle = 'rgba(210,228,255,0.55)';
    ctx.fillRect(0, 0, W, H);

    // Broad diffuse bloom from multiple ceiling fixtures along the length
    const tubeCount = Math.max(3, Math.round((isH ? r.width : r.height) / 100));
    for (let i = 0; i < tubeCount; i++) {
      const t = (i + 0.5) / tubeCount;
      const px = isH ? r.left + r.width * t : r.cx;
      const py = isH ? r.cy : r.top + r.height * t;
      const spread = Math.max(r.width, r.height) * 0.75;
      const gr = ctx.createRadialGradient(px, py, 0, px, py, spread);
      gr.addColorStop(0,   'rgba(230,242,255,0.55)');
      gr.addColorStop(0.3, 'rgba(200,222,255,0.30)');
      gr.addColorStop(0.7, 'rgba(180,210,255,0.10)');
      gr.addColorStop(1,   'rgba(160,200,255,0)');
      ctx.fillStyle = gr;
      ctx.fillRect(0, 0, W, H);
    }

    // Subtle cool shadow only at the very wall edges (not dramatic)
    const sg = isH
      ? ctx.createLinearGradient(r.cx, r.top, r.cx, r.bottom)
      : ctx.createLinearGradient(r.left, r.cy, r.right, r.cy);
    sg.addColorStop(0,    'rgba(0,10,30,0.22)');
    sg.addColorStop(0.12, 'rgba(0,0,0,0)');
    sg.addColorStop(0.88, 'rgba(0,0,0,0)');
    sg.addColorStop(1,    'rgba(0,10,30,0.22)');
    ctx.fillStyle = sg;
    ctx.fillRect(0, 0, W, H);
  }

  ctx.restore();
}

// ─── Feature helpers (corridor-specific) ──────────────────

function corridorPoints(r, n) {
  // n evenly spaced points along the corridor center line
  const pts = [];
  for (let i = 0; i < n; i++) {
    const t = (i + 0.5) / n;
    if (state.direction === 'horizontal') pts.push({ x: r.left + r.width * t, y: r.cy });
    else pts.push({ x: r.cx, y: r.top + r.height * t });
  }
  return pts;
}

function drawCorridorPillars(r, wallColors, rng) {
  const isH = state.direction === 'horizontal';
  const across = isH ? r.height : r.width;
  const pr = across * 0.08 + 3;
  const n = state.columns;
  const margin = 0.1;

  for (let i = 0; i < n; i++) {
    const t = n === 1 ? 0.5 : margin + (i / (n - 1)) * (1 - margin * 2);
    const sides = [-1, 1];
    for (const s of sides) {
      const x = isH ? r.left + r.width * t : r.cx + s * (r.width * 0.3);
      const y = isH ? r.cy + s * (r.height * 0.3) : r.top + r.height * t;

      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.8)';
      ctx.shadowBlur = 10;
      ctx.shadowOffsetX = state.heightShadow * 0.4;
      ctx.shadowOffsetY = state.heightShadow * 0.6;
      ctx.fillStyle = wallColors.dark;
      ctx.beginPath(); ctx.arc(x, y, pr, 0, Math.PI*2); ctx.fill();
      ctx.restore();

      const grad = ctx.createRadialGradient(x-pr*0.3, y-pr*0.3, 0, x, y, pr);
      grad.addColorStop(0, wallColors.light);
      grad.addColorStop(0.6, wallColors.base);
      grad.addColorStop(1, wallColors.dark);
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(x, y, pr, 0, Math.PI*2); ctx.fill();

      ctx.fillStyle = wallColors.light + '60';
      ctx.beginPath();
      ctx.arc(x-pr*0.25, y-pr*0.25, pr*0.3, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

function drawCorridorTorches(r, rng) {
  const isH = state.direction === 'horizontal';
  const n = Math.max(2, Math.round((isH ? r.width : r.height) / 120));

  for (let i = 0; i < n; i++) {
    const t = (i + 0.5) / n;
    const sides = [-1, 1];
    for (const s of sides) {
      const tx = isH ? r.left + r.width * t : r.cx + s * (r.width * 0.45);
      const ty = isH ? r.cy + s * (r.height * 0.45) : r.top + r.height * t;

      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(tx-4, ty-2, 8, 4);
      ctx.save();
      ctx.shadowColor = '#ff8020'; ctx.shadowBlur = 20;
      const fGrad = ctx.createRadialGradient(tx, ty-6, 0, tx, ty-6, 14);
      fGrad.addColorStop(0, '#ffe080'); fGrad.addColorStop(0.4, '#ff8020'); fGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = fGrad; ctx.fillRect(tx-14, ty-20, 28, 28);
      ctx.restore();
      ctx.strokeStyle = '#6a4a20'; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(tx, ty-2); ctx.lineTo(tx, ty-10); ctx.stroke();
      ctx.fillStyle = '#ffe080c0';
      ctx.beginPath();
      ctx.moveTo(tx-4, ty-10);
      ctx.quadraticCurveTo(tx, ty-18, tx+4, ty-10);
      ctx.fill();
    }
  }
}

function drawCorridorCracks(r, floorC, rng) {
  ctx.save();
  ctx.beginPath(); ctx.rect(r.left, r.top, r.width, r.height); ctx.clip();
  ctx.globalAlpha = 0.4; ctx.strokeStyle = floorC.dark;
  for (let i = 0; i < 10; i++) {
    const x = r.left + rng()*r.width, y = r.top + rng()*r.height;
    ctx.lineWidth = 0.8 + rng();
    ctx.beginPath(); ctx.moveTo(x, y);
    let lx=x, ly=y;
    for (let j = 0; j < 5; j++) { lx+=(rng()-0.5)*28; ly+=(rng()-0.5)*28; ctx.lineTo(lx,ly); }
    ctx.stroke();
  }
  ctx.restore();
}

function drawCorridorRubble(r, wallColors, rng) {
  ctx.save();
  ctx.beginPath(); ctx.rect(r.left, r.top, r.width, r.height); ctx.clip();
  for (let i = 0; i < 16; i++) {
    const x = r.left+rng()*r.width, y = r.top+rng()*r.height;
    ctx.save(); ctx.translate(x,y); ctx.rotate(rng()*Math.PI);
    const s = 3+rng()*12;
    ctx.fillStyle = rng()>0.5 ? wallColors.dark : wallColors.base;
    ctx.beginPath(); ctx.moveTo(0,-s/2); ctx.lineTo(s*0.6,0); ctx.lineTo(s*0.3,s*0.7); ctx.lineTo(-s*0.4,s*0.5); ctx.lineTo(-s*0.6,-s*0.2); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

function drawCorridorBlood(r, rng) {
  ctx.save();
  ctx.beginPath(); ctx.rect(r.left, r.top, r.width, r.height); ctx.clip();
  ctx.globalAlpha = 0.45;
  for (let i = 0; i < 6; i++) {
    const x = r.left+rng()*r.width, y = r.top+rng()*r.height;
    ctx.fillStyle = '#6a0a0a';
    ctx.beginPath(); ctx.ellipse(x,y,8+rng()*18,5+rng()*10,rng()*Math.PI,0,Math.PI*2); ctx.fill();
    for (let j = 0; j < 3; j++) {
      const da = rng()*Math.PI*2, dd = rng()*16;
      ctx.beginPath(); ctx.arc(x+dd*Math.cos(da),y+dd*Math.sin(da),rng()*3+1,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.restore();
}

function drawCorridorChains(r, rng) {
  ctx.save();
  ctx.beginPath(); ctx.rect(r.left, r.top, r.width, r.height); ctx.clip();
  ctx.strokeStyle = '#5a5040'; ctx.lineWidth = 2.5; ctx.setLineDash([4,3]);
  for (let i = 0; i < 2; i++) {
    const x1 = r.left+rng()*r.width, y1 = r.top+rng()*r.height;
    const x2 = r.left+rng()*r.width, y2 = r.top+rng()*r.height;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.quadraticCurveTo(r.cx+(rng()-0.5)*40, r.cy+(rng()-0.5)*40, x2,y2); ctx.stroke();
  }
  ctx.setLineDash([]); ctx.restore();
}

function drawCorridorChest(r, rng) {
  const tx = r.left + r.width * (0.3 + rng()*0.4);
  const ty = r.top + r.height * (0.3 + rng()*0.4);
  ctx.save();
  ctx.beginPath(); ctx.rect(r.left, r.top, r.width, r.height); ctx.clip();
  ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 4;
  ctx.fillStyle = '#4a2a0a'; ctx.fillRect(tx-12, ty-8, 24, 16); ctx.restore();
  ctx.fillStyle = '#6a4020'; ctx.fillRect(tx-12, ty-8, 24, 7);
  ctx.strokeStyle = '#8a7020'; ctx.lineWidth = 1.5; ctx.strokeRect(tx-12,ty-8,24,16);
  ctx.beginPath(); ctx.moveTo(tx,ty-8); ctx.lineTo(tx,ty+8); ctx.stroke();
  ctx.fillStyle = '#2a1a08'; ctx.beginPath(); ctx.arc(tx,ty+2,2.5,0,Math.PI*2); ctx.fill();
}

function drawCorridorBarrels(r, wallColors, rng) {
  const n = 2 + (rng()*2|0);
  for (let i = 0; i < n; i++) {
    const side = rng() > 0.5 ? -1 : 1;
    const isH = state.direction === 'horizontal';
    const x = isH ? r.left + r.width * (0.15 + rng()*0.7) : r.cx + side * (r.width * 0.35);
    const y = isH ? r.cy + side * (r.height * 0.35) : r.top + r.height * (0.15 + rng()*0.7);
    const rad = 8 + rng()*5;
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 6; ctx.shadowOffsetY = 3;
    ctx.fillStyle = '#4a2a0a';
    ctx.beginPath(); ctx.ellipse(x, y, rad, rad*1.35, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // Hoops
    ctx.strokeStyle = '#6a5020'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(x, y-rad*0.5, rad, rad*0.25, 0, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(x, y+rad*0.5, rad, rad*0.25, 0, 0, Math.PI*2); ctx.stroke();
    // Highlight
    ctx.fillStyle = '#7a4020'; ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.ellipse(x-rad*0.3, y-rad*0.5, rad*0.25, rad*0.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawCorridorBones(r, rng) {
  ctx.save();
  ctx.beginPath(); ctx.rect(r.left, r.top, r.width, r.height); ctx.clip();
  ctx.globalAlpha = 0.6;
  for (let i = 0; i < 8; i++) {
    const x = r.left+rng()*r.width, y = r.top+rng()*r.height;
    const a = rng()*Math.PI; const l = 10+rng()*20;
    ctx.strokeStyle = '#c8b890'; ctx.lineWidth = 2;
    ctx.save(); ctx.translate(x,y); ctx.rotate(a);
    ctx.beginPath(); ctx.moveTo(-l/2,0); ctx.lineTo(l/2,0); ctx.stroke();
    ctx.fillStyle = '#c8b890';
    ctx.beginPath(); ctx.arc(-l/2,0,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(l/2,0,3,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha = 1; ctx.restore();
}

// ─── Corridor ends ────────────────────────────────────────
const SCIFI_MATS = new Set(['spacestation','office','smooth','concrete','martian']);

function drawCorridorEnds(r, wallColors, wallW, rng) {
  const isH = state.direction === 'horizontal';

  if (state.ends === 'none') {
    // Walls continue all the way — no opening, no barrier. Just extend the wall
    // material flush over the end faces so there is no gap or perpendicular wall.
    const outerPath = new Path2D();
    outerPath.rect(r.left - wallW, r.top - wallW, r.width + wallW * 2, r.height + wallW * 2);
    const innerPath = new Path2D();
    innerPath.rect(r.left, r.top, r.width, r.height);
    // Already drawn — nothing extra needed; the outer rect naturally closes the ends.
    return;
  }

  // 'open' — void passage openings at each end
  const ends = isH
    ? [{ x: r.left, y: r.cy, angle: Math.PI },    { x: r.right, y: r.cy, angle: 0 }]
    : [{ x: r.cx, y: r.top, angle: Math.PI*1.5 }, { x: r.cx, y: r.bottom, angle: Math.PI*0.5 }];

  const across = isH ? r.height : r.width;
  const halfW = across * 0.5;

  for (const end of ends) {
    drawOpenEnd(end, halfW, wallW, wallColors, isH, r);
  }
}

function drawOpenEnd(end, halfW, wallW, wallColors, isH, r) {
  // Just a subtle opening void
  ctx.save();
  const depth = wallW * 1.2;
  if (isH) {
    const dir = end.angle === Math.PI ? -1 : 1;
    const grad = ctx.createLinearGradient(end.x, end.y, end.x + dir*depth, end.y);
    grad.addColorStop(0, 'rgba(0,0,0,0.6)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(end.x - (dir<0 ? depth : 0), end.y - halfW, depth, halfW*2);
  } else {
    const dir = end.angle > Math.PI ? -1 : 1;
    const grad = ctx.createLinearGradient(end.x, end.y, end.x, end.y + dir*depth);
    grad.addColorStop(0, 'rgba(0,0,0,0.6)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(end.x - halfW, end.y - (dir<0 ? depth : 0), halfW*2, depth);
  }
  ctx.restore();
}

// ─── Description ──────────────────────────────────────────
function updateDescription() {
  const matNames = { stone:'rough-hewn stone', brick:'fitted brickwork', marble:'polished marble', wood:'aged timber', obsidian:'black obsidian', ice:'glacial ice', dirt:'packed earth', sandstone:'eroded sandstone', crystal:'crystalline mineral', smooth:'smooth plastered walls', concrete:'poured concrete', office:'office drywall panels', spacestation:'space station hull plating', martian:'martian bedrock' };
  const lightNames = { torchlit:'torchlit', dim:'dimly shadowed', bright:'magically illuminated', unlit:'pitch-black', bioluminescent:'bathed in bioluminescent glow', hellish:'lit by hellish fire', fluorescent:'harshly fluorescent-lit' };
  const endNames = { open:'open', none:'closed' };
  const r = getCorridorRect();
  const ratio = state.ratio === 'custom' ? `${state.customX}:${state.customY}` : `${state.ratio}:1`;
  const feats = [...state.features].join(', ');
  document.getElementById('descBox').innerHTML =
    `<em>A ${state.direction} corridor of ${matNames[state.material]}, ${lightNames[state.lighting]}. ` +
    `Dimensions ${ratio} ratio, ${endNames[state.ends]} at both ends.` +
    (feats ? ` Features: ${feats}.` : '') + `</em>`;
}

// ─── UI wiring ────────────────────────────────────────────
document.querySelectorAll('[data-dir]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-dir]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.direction = btn.dataset.dir;
    state.seed = Math.random() * 10000 | 0;
    draw();
  });
});

document.querySelectorAll('[data-ratio]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-ratio]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const v = btn.dataset.ratio;
    if (v === 'custom') {
      state.ratio = 'custom';
      document.getElementById('customRatioRow').style.display = 'block';
    } else {
      state.ratio = parseFloat(v);
      document.getElementById('customRatioRow').style.display = 'none';
    }
    state.seed = Math.random() * 10000 | 0;
    draw();
  });
});

document.getElementById('ratioXSlider').addEventListener('input', e => {
  state.customX = +e.target.value;
  document.getElementById('ratioXVal').textContent = e.target.value;
  draw();
});
document.getElementById('ratioYSlider').addEventListener('input', e => {
  state.customY = +e.target.value;
  document.getElementById('ratioYVal').textContent = e.target.value;
  draw();
});

document.querySelectorAll('[data-end]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-end]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.ends = btn.dataset.end;
    draw();
  });
});

function wireRange(id, valId, key, suffix = '') {
  const slider = document.getElementById(id);
  const val = document.getElementById(valId);
  slider.addEventListener('input', () => {
    state[key] = +slider.value;
    val.textContent = slider.value + suffix;
    draw();
  });
}
wireRange('scaleSlider', 'scaleVal', 'scale', '%');
wireRange('wallSlider', 'wallVal', 'wallThick', '');
wireRange('heightSlider', 'heightVal', 'heightShadow', '');


document.getElementById('materialSelect').addEventListener('change', e => { state.material = e.target.value; draw(); });
document.getElementById('lightingSelect').addEventListener('change', e => { state.lighting = e.target.value; draw(); });

document.querySelectorAll('#wallSwatches .swatch').forEach(s => {
  s.addEventListener('click', () => {
    document.querySelectorAll('#wallSwatches .swatch').forEach(x => x.classList.remove('active'));
    s.classList.add('active'); state.wallColor = s.dataset.color; draw();
  });
});

document.querySelectorAll('#floorSwatches .swatch').forEach(s => {
  s.addEventListener('click', () => {
    document.querySelectorAll('#floorSwatches .swatch').forEach(x => x.classList.remove('active'));
    s.classList.add('active'); state.floorColor = s.dataset.color; draw();
  });
});

document.querySelectorAll('[data-feat]').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.feat;
    if (state.features.has(f)) { state.features.delete(f); btn.classList.remove('active'); }
    else { state.features.add(f); btn.classList.add('active'); }
    draw();
  });
});





// ─── Column counter ───────────────────────────────────────
document.getElementById('colDec').addEventListener('click', () => {
  if (state.columns > 1) { state.columns--; document.getElementById('colCountVal').textContent = state.columns; draw(); }
});
document.getElementById('colInc').addEventListener('click', () => {
  if (state.columns < 12) { state.columns++; document.getElementById('colCountVal').textContent = state.columns; draw(); }
});


document.getElementById('dlBtn').addEventListener('click', () => {
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const octx = off.getContext('2d');
  octx.drawImage(canvas, 0, 0);

  const r = getCorridorRect();
  const wallColors = WALL_COLORS[state.wallColor] || WALL_COLORS.stone;
  const maxDim = Math.max(r.width, r.height);
  const wallW = maxDim * (state.wallThick / 100);

  octx.save();
  octx.globalCompositeOperation = 'destination-in';
  octx.fillStyle = '#fff';
  octx.fillRect(r.left - wallW, r.top - wallW, r.width + wallW*2, r.height + wallW*2);
  octx.restore();

  const link = document.createElement('a');
  link.download = 'corridor.png';
  link.href = off.toDataURL('image/png');
  link.click();
});

draw();
